            grid.innerHTML = testimonials.map(item => `
                <div class="p-8 bg-slate-900/40 rounded-3xl border border-blue-900/20">
                    <p class="italic text-slate-300 mb-6 text-lg">"${item.text[currentLang]}"</p>
                    <h4 class="font-bold text-white">${item.name}</h4>
                    <p class="text-blue-500 text-xs">${item.company}</p>
                </div>
            `).join('');
        }

        function renderLessons() {
            const grid = document.getElementById('lessons-grid');
            grid.innerHTML = lessons.map(lesson => {
                let badge = lesson.hasPractice ? `<div class="absolute top-0 right-0 bg-blue-600 text-white text-[8px] font-bold px-3 py-1 rounded-bl-xl uppercase tracking-widest">${translations[currentLang].practiceLabel}</div>` : '';
                let topics = lesson.topics[currentLang].map(topic => `<li class="text-xs flex items-center gap-2 text-slate-500"><span class="w-1 h-1 rounded-full bg-blue-900"></span>${topic}</li>`).join('');
                return `
                    <div class="group p-6 rounded-2xl bg-slate-900/40 border border-blue-900/20 hover:border-blue-500/40 transition-all relative overflow-hidden text-left">
                        ${badge}
                        <span class="text-xs font-brand font-bold text-blue-500/50 mb-4">${translations[currentLang].classLabel} ${lesson.id}</span>
                        <h3 class="text-lg font-bold text-white mb-4 font-brand group-hover:text-blue-400 transition-colors">${lesson.title[currentLang]}</h3>
                        <ul class="space-y-2 mt-auto">${topics}</ul>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
